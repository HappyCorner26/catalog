<!DOCTYPE html>
<html>
<head>
  <title>My Catalog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #111; color: white; padding: 15px; text-align: center; }
    .container { padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card { background: white; padding: 10px; border-radius: 10px; }
    .btn { display: block; margin-top: 8px; padding: 8px; background: green; color: white; text-align: center; text-decoration: none; border-radius: 5px; }
    img { width: 100%; border-radius: 8px; }
  </style>
</head>
<body>

<header>
  <h2>My Product Catalog</h2>
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Product 1</h3>
    <p>₹100</p>
    <a class="btn" href="https://wa.me/918119995258?text=I want Product 1">Order on WhatsApp</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Product 2</h3>
    <p>₹200</p>
    <a class="btn" href="https://wa.me/918119995258?text=I want Product 2">Order on WhatsApp</a>
  </div>

</div>

</body>
</html>
